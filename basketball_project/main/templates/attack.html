{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Court Vision</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f8f9fa;
  color: #333;
}

header {
  text-align: center;
  padding: 50px 20px 30px;
  background: linear-gradient(90deg, #ff7f50, #ff6347);
  color: white;
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2px;
}

.navbar {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #fff;
  padding: 15px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.navbar a {
  text-decoration: none;
  color: #ff6347;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 8px;
  transition: background 0.3s, color 0.3s;
}

.navbar a:hover {
  background: #ff6347;
  color: white;
}

.navbar a.active {
  background: #ff6347;
  color: white;
}

.main-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
  padding: 50px 20px;
}

.card {
  width: 220px;
  height: 140px;
  background-color: white;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
  color: #ff6347;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  width: 0;
  height: 100%;
  top: 0;
  left: 0;
  background: rgba(255,99,71,0.1);
  transition: width 0.3s;
}

.card:hover::before {
  width: 100%;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

.card a {
  text-decoration: none;
  color: inherit;
  z-index: 1;
}

.footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
  color: #777;
}
</style>
</head>
<body>

<header>
  Court Vision
</header>

<!-- Навигация сверху -->
<div class="navbar">
  <a href="{% url 'home' %}" class="active">Главная</a>
  <a href="{% url 'attack' %}">Атака</a>
  <a href="{% url 'defense' %}">Защита</a>
  <a href="{% url 'news' %}">Новости</a>
  <a href="{% url 'players' %}">Игроки</a>
</div>

<!-- Основной контент -->
<div class="main-container">
  <div class="card"><a href="{% url 'attack' %}">Атака</a></div>
  <div class="card"><a href="{% url 'defense' %}">Защита</a></div>
  <div class="card"><a href="{% url 'news' %}">Новости</a></div>
  <div class="card"><a href="{% url 'players' %}">Игроки</a></div>
</div>

<div class="footer">
  &copy; 2026 Court Vision | Сделано с баскетбольной страстью 🏀
</div>

</body>
</html>
