<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Basketball Project</title>

    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
        }

        /* ===== ФОНОВОЕ ИЗОБРАЖЕНИЕ ===== */
        body.dark {
            background-image: url('https://images.unsplash.com/photo-1610452460453-3b58a2143a03?ixlib=rb-4.0.3&auto=format&fit=crop&w=1650&q=80');
        }

        body.light {
            background-image: url('https://images.unsplash.com/photo-1610452460453-3b58a2143a03?ixlib=rb-4.0.3&auto=format&fit=crop&w=1650&q=80');
            color: #222;
        }

        /* ===== HEADER ===== */
        header {
            padding: 20px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            position: relative;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        body.light header {
            background: rgba(255,255,255,0.3);
            color: #222;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* ===== НАВИГАЦИЯ ===== */
        nav {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        body.light nav {
            background: rgba(255,255,255,0.3);
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            color: #FFC72C; /* яркий цвет на фоне */
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(0,0,0,0.4); /* тёмный полупрозрачный фон */
            transition: color 0.3s, transform 0.3s, background 0.3s;
        }

        nav a:hover {
            transform: scale(1.1);
            background: rgba(0,0,0,0.7);
            color: #fff;
        }

        body.light nav a {
            color: #1D428A;
            background: rgba(255,255,255,0.5);
        }

        body.light nav a:hover {
            background: rgba(255,255,255,0.8);
            color: #FFC72C;
        }

        /* ===== КАРТОЧКИ ===== */
        .content {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 90%;
            max-width: 700px;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            color: inherit;
        }

        body.light .card {
            background: rgba(255,255,255,0.6);
            color: #222;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== КНОПКА ТЕМЫ ===== */
        .theme-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            padding: 10px 16px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.3s ease, background 0.3s ease;
            background: rgba(0,0,0,0.6);
            color: #FFC72C;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(20deg);
            background: rgba(0,0,0,0.8);
        }

        body.light .theme-btn {
            background: rgba(255,255,255,0.5);
            color: #1D428A;
            border: 1px solid rgba(0,0,0,0.1);
        }

        body.light .theme-btn:hover {
            background: rgba(255,255,255,0.8);
            color: #FFC72C;
        }
    </style>
</head>

<body class="dark">

<header>
    BASKETBALL PROJECT 🏀
    <button class="theme-btn" onclick="toggleTheme()">🌙 / ☀</button>
</header>

<nav>
    <a href="/">Главная</a>
    <a href="/attack/">Атака</a>
    <a href="/defense/">Защита</a>
    <a href="/news/">Новости</a>
    <a href="/players/">Игроки</a>
</nav>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        if(body.classList.contains('dark')) {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('theme','light');
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('theme','dark');
        }
    }

    window.onload = function() {
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme) {
            document.body.classList.remove('dark','light');
            document.body.classList.add(savedTheme);
        }
    }
</script>

</body>
</html>
