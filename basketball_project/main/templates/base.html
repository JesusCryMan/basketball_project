<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hoop Legends</title>
    <!-- Шрифты: Roboto для текста, Bangers для заголовков -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Bangers&display=swap" rel="stylesheet">
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            background-color: #121212;
            color: #fff;
        }

        body.light {
            background-color: #f5f5f5;
            color: #222;
        }

        h1,h2,h3,h4,h5,h6 {
            font-family: 'Bangers', cursive;
        }

        /* ===== HEADER ===== */
        header {
            position: relative;
            padding: 20px 40px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #FFC72C;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            transition: background 0.5s, color 0.5s;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        body.light header {
            background: rgba(255,255,255,0.85);
            color: #1D428A;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        /* ===== КНОПКА ТЕМЫ ===== */
        .theme-btn {
            position: absolute;
            right: 30px;
            top: 25px;
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            color: #FFC72C;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px #FFC72C80;
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 20px #FFC72C;
        }

        body.light .theme-btn {
            background: rgba(255,255,255,0.7);
            color: #1D428A;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: none;
        }

        body.light .theme-btn:hover {
            background: rgba(255,255,255,0.95);
            color: #FFC72C;
        }

        /* ===== НАВИГАЦИЯ ===== */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            transition: background 0.5s;
        }

        body.light nav {
            background: rgba(255,255,255,0.85);
        }

        nav a {
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 8px 18px;
            border-radius: 10px;
            color: #FFC72C;
            background: rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            box-shadow: 0 0 8px #FFC72C50;
        }

        nav a:hover {
            transform: scale(1.1);
            background: #FFC72C;
            color: #121212;
            box-shadow: 0 0 15px #FFC72C;
        }

        body.light nav a {
            color: #1D428A;
            background: rgba(255,255,255,0.5);
            box-shadow: none;
        }

        body.light nav a:hover {
            background: #FFC72C;
            color: #121212;
            box-shadow: 0 0 10px #FFC72C;
        }

        /* ===== КОНТЕНТ ===== */
        .content {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            margin: auto;
        }

        /* ===== КАРТОЧКИ ===== */
        .card {
            width: 100%;
            max-width: 700px;
            padding: 25px;
            margin: 20px 0;
            border-radius: 15px;
            background: linear-gradient(145deg, #1a1a1a, #222);
            backdrop-filter: blur(8px);
            color: inherit;
            transition: transform 0.4s ease, box-shadow 0.4s ease, background 0.4s;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s forwards;
        }

        body.light .card {
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            color: #222;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255,199,44,0.5);
        }

        /* ===== ПЛАВНОЕ ПОЯВЛЕНИЕ ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* ===== ССЫЛКИ ===== */
        a {
            color: #FFC72C;
            transition: all 0.3s ease;
            text-decoration: none;
            text-shadow: 0 0 5px #FFC72C80;
        }

        a:hover {
            color: #FFB347;
            text-shadow: 0 0 10px #FFC72C;
        }

        body.light a {
            color: #1D428A;
            text-shadow: none;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:768px) {
            header { font-size: 2rem; padding: 15px; }
            nav a { padding: 6px 12px; font-size: 0.9rem; }
            .theme-btn { top: 15px; right: 15px; padding: 8px 12px; font-size: 0.9rem; }
        }
    </style>
</head>

<body class="dark">
<header>
    Hoop Legends 🏀
    <button class="theme-btn" onclick="toggleTheme()">🌙 / ☀</button>
</header>

<nav>
    <a href="/">Главная</a>
    <a href="/attack/">Атака</a>
    <a href="/defense/">Защита</a>
    <a href="{% url 'news' %}">Новости</a>
    <a href="/players/">Игроки</a>
    <a href="{% url 'tacboard' %}">Тактики</a>
</nav>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

<script>
    // Переключение темы
    function toggleTheme() {
        const body = document.body;
        if(body.classList.contains('dark')) {
            body.classList.replace('dark','light');
            localStorage.setItem('theme','light');
        } else {
            body.classList.replace('light','dark');
            localStorage.setItem('theme','dark');
        }
    }

    // Плавное появление карточек при скролле
    function fadeInOnScroll() {
        const cards = document.querySelectorAll('.card');
        const windowBottom = window.innerHeight;
        cards.forEach(card => {
            const cardTop = card.getBoundingClientRect().top;
            if(cardTop < windowBottom - 50) {
                card.style.opacity = 1;
                card.style.transform = 'translateY(0)';
            }
        });
    }

    window.addEventListener('scroll', fadeInOnScroll);
    window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme) document.body.className = savedTheme;
        fadeInOnScroll();
    });
</script>
</body>
</html>
