{% extends "base.html" %}
{% load static %}

{% block title %}Новости{% endblock %}

{% block content %}
<div class="news-container">
  <h1 class="page-title">Новости NBA</h1>

  <div class="news-list">
    {% for item in news_list %}
      <div class="news-card">
        <a href="{{ item.link }}" target="_blank" class="news-link">
          <h3>{{ item.title }}</h3>
        </a>
        <span class="news-date">{{ item.date }}</span>
        <p class="news-desc">{{ item.desc|safe }}</p>
      </div>
    {% empty %}
      <p>Новостей пока нет.</p>
    {% endfor %}
  </div>
</div>

<style>
body { background: #121212; color: #fff; font-family: 'Roboto', sans-serif; }
.news-container { max-width: 900px; margin: auto; padding: 30px 20px; }
.page-title { font-family: 'Montserrat', sans-serif; font-size: 42px; margin-bottom: 30px; color: #61dafb; }

.news-list { display: flex; flex-direction: column; gap: 20px; }
.news-card { background: #1e1e1e; padding: 20px; border-radius: 12px; transition: transform 0.3s, box-shadow 0.3s; }
.news-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(97,218,251,0.4); }
.news-link { text-decoration: none; color: #61dafb; }
.news-link:hover { text-decoration: underline; }
.news-date { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
.news-desc { font-size: 14px; color: #ccc; margin-top: 8px; }
</style>
{% endblock %}
