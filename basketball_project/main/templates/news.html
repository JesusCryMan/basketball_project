{% extends "base.html" %}
{% load static %}

{% block title %}Новости{% endblock %}

{% block content %}
<div class="news-container">
    <h2 class="page-title">Последние новости 📰</h2>

    <div class="top-controls">
        <button id="theme-toggle" class="theme-btn">🌙 Тёмная тема</button>
    </div>

    <div class="news-grid">
        {% for news in news_list %}
        <div class="news-card" onclick="openModal('{{ news.img }}','{{ news.title }}','{{ news.desc }}')">
            <img src="{% static news.img %}" alt="{{ news.title }}">
            <h3>{{ news.title }}</h3>
            <p class="news-date">{{ news.date }}</p>
            <p>{{ news.desc|truncatewords:15 }}...</p>
        </div>
        {% endfor %}
    </div>

    <div style="text-align:center;margin-top:20px;">
        <button id="show-more-btn" class="show-more-btn">Показать ещё</button>
    </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="">
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
    </div>
</div>

<style>
body{transition:0.5s;font-family:'Poppins',sans-serif;background:repeating-linear-gradient(90deg,#f5d6a0,#f5d6a0 40px,#f2c98c 40px,#f2c98c 80px);}
body.dark{background:#121212;color:#fff;}
.news-container{max-width:1100px;margin:auto;padding:40px 20px;}
.page-title{font-size:42px;font-weight:800;text-align:center;color:#cc3a00;margin-bottom:30px;}
.top-controls{display:flex;justify-content:center;gap:20px;margin-bottom:20px;}
.theme-btn{padding:10px 20px;cursor:pointer;}

.news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;}
.news-card{background:rgba(255,255,255,0.95);border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);transition:0.3s;cursor:pointer;text-align:center;padding:15px;}
.news-card img{width:100%;border-radius:20px 20px 0 0;height:180px;object-fit:cover;margin-bottom:10px;}
.news-card h3{color:#cc3a00;margin-bottom:5px;}
.news-card .news-date{font-size:13px;color:#777;margin-bottom:10px;}
.news-card p{color:#333;font-size:14px;}
.news-card:hover{transform:scale(1.05) translateY(-5px);box-shadow:0 15px 35px rgba(0,0,0,0.3);}
body.dark .news-card{background:#1e1e1e;}
body.dark .news-card h3{color:#ff6347;}
body.dark .news-card p,.news-card .news-date{color:#fff;}

.show-more-btn{padding:10px 25px;border-radius:25px;background:#cc3a00;color:#fff;border:none;cursor:pointer;transition:0.3s;}
.show-more-btn:hover{background:#ff6347;}

/* Модальное окно */
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.7);}
.modal-content{background:#fff;margin:10% auto;padding:20px;border-radius:20px;max-width:600px;position:relative;text-align:center;}
.modal-content img{width:100%;border-radius:15px;margin-bottom:15px;}
.modal-content h3{color:#cc3a00;margin-bottom:10px;}
.modal-content p{color:#333;}
.close-btn{position:absolute;top:10px;right:20px;font-size:28px;font-weight:bold;color:#ff6347;cursor:pointer;}
body.dark .modal-content{background:#1e1e1e;}
body.dark .modal-content h3{color:#ff6347;}
body.dark .modal-content p{color:#fff;}
</style>

<script>
// Тёмная тема
document.getElementById('theme-toggle').addEventListener('click', ()=>{
    document.body.classList.toggle('dark');
    document.querySelectorAll('.news-card').forEach(c=>c.classList.toggle('dark'));
});

// Модальное окно
function openModal(img,title,desc){
    document.getElementById('modal').style.display='block';
    document.getElementById('modal-img').src="{% static '' %}"+img;
    document.getElementById('modal-title').innerText=title;
    document.getElementById('modal-desc').innerText=desc;
}
function closeModal(){
    document.getElementById('modal').style.display='none';
}

// Показать ещё
let shown = 3;
const cards = document.querySelectorAll('.news-card');
cards.forEach((c,i)=>{ if(i>=shown) c.style.display='none'; });
document.getElementById('show-more-btn').addEventListener('click', ()=>{
    for(let i=shown;i<shown+3 && i<cards.length;i++){
        cards[i].style.display='block';
    }
    shown += 3;
    if(shown >= cards.length){
        document.getElementById('show-more-btn').style.display='none';
    }
});
</script>
{% endblock %}
